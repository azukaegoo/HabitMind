<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password — HabitMind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 w-full max-w-md px-4">
        {% for category, message in messages %}
          <div class="mb-3 rounded-xl border px-4 py-3 text-sm font-medium shadow-lg
            {% if category == 'success' %} border-green-200 bg-green-50 text-green-700
            {% elif category == 'error' %} border-red-200 bg-red-50 text-red-700
            {% else %} border-blue-200 bg-blue-50 text-blue-700 {% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="min-h-screen relative overflow-hidden" style="background: linear-gradient(135deg, #022c22 0%, #064e3b 40%, #065f46 70%, #047857 100%);">
    
    <div class="relative z-10 flex flex-col min-h-screen">
      <header class="px-6 pt-6 pb-2 flex items-center justify-between max-w-5xl mx-auto w-full">
        <div class="flex items-center gap-3">
          <span class="text-white font-bold text-lg tracking-tight">HabitMind</span>
        </div>
        <a href="/settings" class="flex items-center gap-1.5 text-emerald-300 text-sm font-medium px-4 py-2 rounded-lg no-underline">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/><path d="m12 19-7-7 7-7"/>
          </svg>
          Back to Settings
        </a>
      </header>

      <main class="flex-1 flex items-center justify-center px-4 py-10">
        <div class="w-full rounded-2xl border border-white/10 bg-white/5 backdrop-blur-sm p-8 md:p-10" style="max-width: 28rem;">
          
          <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white mb-2">Change Password</h1>
            <p class="text-emerald-200 text-sm leading-relaxed">Update your password to keep your account secure.</p>
          </div>

          <form action="/change-password" method="POST" class="flex flex-col gap-5">
            
            <div class="flex flex-col gap-1.5">
              <label for="current_password" class="text-emerald-100 text-sm font-medium">Current Password</label>
              <input id="current_password" name="current_password" type="password" required
                class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-emerald-200/50 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition-all" />
            </div>

            <div class="flex flex-col gap-1.5">
              <label for="new_password" class="text-emerald-100 text-sm font-medium">New Password</label>
              <input id="new_password" name="new_password" type="password" required
                class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-emerald-200/50 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition-all" />
            </div>

            <div class="flex flex-col gap-1.5">
              <label for="confirm_password" class="text-emerald-100 text-sm font-medium">Confirm New Password</label>
              <input id="confirm_password" name="confirm_password" type="password" required
                class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-emerald-200/50 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition-all" />
            </div>

            <button type="submit" class="mt-2 w-full flex items-center justify-center py-4 rounded-xl font-bold text-emerald-900 shadow-xl transition-all hover:scale-[1.02]" style="background: linear-gradient(135deg, #6ee7b7 0%, #34d399 50%, #10b981 100%);">
              Update Password
            </button>
          </form>

        </div>
      </main>
    </div>
  </div>
</body>
</html>
